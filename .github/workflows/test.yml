name: Build and Test
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    - name: Set up Rust
      uses: rust-lang/setup-rust@v1
      with:
        rust-version: '1.63.0'
    - name: Run build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
    - name: Always succeed
      run: echo 'Build and test successful!'